<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tunes — Chord Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14110E;
    --ink-2:#1E1A16;
    --ink-3:#262019;
    --ivory:#F3ECDD;
    --ivory-dim:#A89E8B;
    --brass:#D29A36;
    --brass-deep:#9E6F1F;
    --line:rgba(243,236,221,0.12);
    --line-strong:rgba(243,236,221,0.22);
    --black-key:#0C0A08;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{background:var(--ink);}
  body{
    background:
      radial-gradient(1100px 600px at 80% -10%, rgba(210,154,54,0.10), transparent 60%),
      radial-gradient(900px 500px at 0% 105%, rgba(210,154,54,0.05), transparent 60%),
      var(--ink);
    background-attachment:fixed;
    color:var(--ivory);
    font-family:"Space Grotesk",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    min-height:100vh;
  }
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:820px;margin:0 auto;padding:32px 22px 96px;}

  /* ---------- Library header ---------- */
  .masthead{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:18px;padding-bottom:22px;border-bottom:1px solid var(--line-strong);
    flex-wrap:wrap;
  }
  .brand{display:flex;flex-direction:column;gap:6px;}
  .brand .eyebrow{
    font-size:11px;letter-spacing:0.32em;text-transform:uppercase;
    color:var(--brass);font-weight:600;
  }
  .brand h1{
    font-family:"Fraunces",serif;font-weight:600;font-size:clamp(40px,8vw,68px);
    line-height:0.92;margin:0;letter-spacing:-0.01em;
  }
  .brand h1 em{font-style:italic;color:var(--brass);}
  .tally{
    text-align:right;font-size:13px;color:var(--ivory-dim);line-height:1.4;
    font-variant-numeric:tabular-nums;
  }
  .tally b{color:var(--ivory);font-size:26px;font-family:"Fraunces",serif;font-weight:600;display:block;}

  /* ---------- Controls ---------- */
  .controls{
    display:flex;gap:12px;align-items:center;margin:22px 0 8px;flex-wrap:wrap;
  }
  .search{
    flex:1 1 240px;display:flex;align-items:center;gap:10px;
    background:var(--ink-2);border:1px solid var(--line);border-radius:999px;
    padding:10px 16px;min-width:0;
  }
  .search input{
    background:transparent;border:0;color:var(--ivory);font-family:inherit;
    font-size:15px;width:100%;outline:none;
  }
  .search input::placeholder{color:var(--ivory-dim);}
  .search svg{flex:none;opacity:0.6;}
  .seg{
    display:inline-flex;background:var(--ink-2);border:1px solid var(--line);
    border-radius:999px;padding:4px;gap:2px;
  }
  .seg button{
    font-family:inherit;font-size:13px;font-weight:600;letter-spacing:0.02em;
    color:var(--ivory-dim);background:transparent;border:0;cursor:pointer;
    padding:7px 15px;border-radius:999px;transition:color .18s,background .18s;
  }
  .seg button[aria-pressed="true"]{background:var(--brass);color:#1a1206;}

  /* ---------- Song list ---------- */
  .list{margin-top:14px;}
  .row{
    display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px;
    padding:18px 6px;border-bottom:1px solid var(--line);cursor:pointer;
    transition:padding-left .2s ease, background .2s ease;
  }
  .row:hover{padding-left:16px;background:linear-gradient(90deg,rgba(210,154,54,0.08),transparent 70%);}
  .row .t{font-family:"Fraunces",serif;font-size:21px;font-weight:500;line-height:1.15;}
  .row:hover .t{color:var(--brass);}
  .row .a{font-size:13px;color:var(--ivory-dim);margin-top:2px;letter-spacing:0.01em;}
  .keychip{
    font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:700;
    color:var(--brass);border:1px solid var(--brass-deep);border-radius:7px;
    padding:5px 9px;white-space:nowrap;letter-spacing:0.02em;
  }
  .row.todo{cursor:default;}
  .row.todo:hover{padding-left:6px;background:none;}
  .row.todo .t{color:var(--ivory-dim);font-weight:400;}
  .soon{
    font-family:"Space Grotesk",sans-serif;font-size:10px;font-weight:600;
    letter-spacing:0.16em;text-transform:uppercase;color:var(--ivory-dim);
    border:1px solid var(--line);border-radius:7px;padding:5px 9px;white-space:nowrap;
  }
  .hint{
    margin-top:26px;padding:18px 20px;border:1px dashed var(--line-strong);
    border-radius:var(--radius);color:var(--ivory-dim);font-size:13.5px;line-height:1.6;
  }
  .hint b{color:var(--ivory);}
  .empty{padding:48px 6px;color:var(--ivory-dim);font-size:15px;text-align:center;}

  /* ---------- Song page ---------- */
  .back{
    display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;
    letter-spacing:0.04em;text-transform:uppercase;color:var(--ivory-dim);
    margin-bottom:24px;transition:color .18s;
  }
  .back:hover{color:var(--brass);}
  .songhead h2{
    font-family:"Fraunces",serif;font-weight:600;font-size:clamp(32px,6.5vw,52px);
    line-height:1.0;margin:0 0 8px;letter-spacing:-0.01em;
  }
  .songhead .by{font-size:15px;color:var(--ivory-dim);}
  .songhead .by span{color:var(--ivory);}
  .patch{
    display:inline-flex;align-items:center;gap:8px;margin-top:14px;
    font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ivory-dim);
    background:var(--ink-2);border:1px solid var(--line);border-radius:8px;padding:7px 11px;
  }
  .patch b{color:var(--brass);font-weight:700;}

  /* ---------- Pitch console (signature) ---------- */
  .console{
    margin:28px 0 34px;background:linear-gradient(180deg,var(--ink-3),var(--ink-2));
    border:1px solid var(--line-strong);border-radius:var(--radius);
    padding:18px;display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:center;
    box-shadow:inset 0 1px 0 rgba(243,236,221,0.05), 0 18px 40px -28px #000;
  }
  .readout{display:flex;flex-direction:column;gap:8px;min-width:150px;}
  .readout .lbl{font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:var(--ivory-dim);}
  .keyflow{display:flex;align-items:baseline;gap:10px;font-family:"JetBrains Mono",monospace;}
  .keyflow .orig{font-size:14px;color:var(--ivory-dim);text-decoration:line-through;text-decoration-color:var(--line-strong);}
  .keyflow .arrow{color:var(--brass-deep);}
  .keyflow .now{font-size:26px;font-weight:700;color:var(--brass);letter-spacing:0.01em;}
  .keyflow.same .orig{display:none;}
  .keyflow.same .arrow{display:none;}

  .panel-right{display:flex;flex-direction:column;gap:14px;align-items:flex-end;}
  .stepper{display:flex;align-items:center;gap:10px;}
  .stepper .semi{
    font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--ivory-dim);
    min-width:104px;text-align:center;font-variant-numeric:tabular-nums;
  }
  .stepper .semi b{color:var(--ivory);}
  .btn{
    font-family:inherit;cursor:pointer;border-radius:10px;border:1px solid var(--line-strong);
    background:var(--ink);color:var(--ivory);width:42px;height:42px;font-size:20px;
    display:grid;place-items:center;transition:transform .1s, border-color .18s, background .18s;
  }
  .btn:hover{border-color:var(--brass);color:var(--brass);}
  .btn:active{transform:translateY(1px) scale(0.97);}
  .reset{
    font-family:inherit;font-size:12px;font-weight:600;letter-spacing:0.04em;
    text-transform:uppercase;color:var(--ivory-dim);background:transparent;border:0;
    cursor:pointer;padding:4px 2px;transition:color .18s;
  }
  .reset:hover{color:var(--brass);}
  .reset[disabled]{opacity:0.3;cursor:default;}

  /* ---------- Singer's-key (performance) controls ---------- */
  .keymodes{display:flex;gap:0;border:1px solid var(--line-strong);border-radius:10px;overflow:hidden;}
  .seg2{
    font-family:inherit;font-size:12px;font-weight:600;letter-spacing:0.03em;cursor:pointer;
    background:var(--ink);color:var(--ivory-dim);border:0;padding:9px 13px;transition:color .18s, background .18s;
    border-right:1px solid var(--line-strong);white-space:nowrap;
  }
  .seg2:last-child{border-right:0;}
  .seg2:hover:not(:disabled){color:var(--brass);}
  .seg2.active{background:var(--brass);color:var(--ink);font-weight:700;}
  .seg2:disabled{opacity:0.4;cursor:default;}
  .save{
    font-family:inherit;font-size:12px;font-weight:600;letter-spacing:0.02em;cursor:pointer;
    background:var(--ink-2);color:var(--brass);border:1px solid var(--line-strong);border-radius:10px;
    padding:9px 13px;transition:border-color .18s, background .18s, color .18s;white-space:nowrap;
  }
  .save:hover:not(:disabled){border-color:var(--brass);background:var(--ink-3);}
  .save:disabled{opacity:0.35;cursor:default;color:var(--ivory-dim);}
  .perfnote{font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--ivory-dim);text-align:right;max-width:230px;}
  .perfnote b{color:var(--brass);}
  .perfnote .muted{color:var(--ivory-dim);opacity:0.75;}
  .linkbtn{background:transparent;border:0;color:var(--brass-deep);cursor:pointer;font:inherit;text-decoration:underline;padding:0 0 0 4px;}
  .linkbtn:hover{color:var(--brass);}
  .keychip.perf{background:var(--brass);color:var(--ink);border-color:var(--brass);}
  .row .chips{display:flex;gap:6px;align-items:center;}
  .suggested-wrap{margin-top:46px;}
  .suggested-head{display:flex;flex-direction:column;gap:4px;padding:0 4px 14px;border-top:1px solid var(--line);padding-top:26px;}
  .sg-title{font-family:"Fraunces",serif;font-size:20px;font-weight:600;color:var(--brass);letter-spacing:0.01em;}
  .sg-sub{font-size:13px;color:var(--ivory-dim);max-width:46ch;}

  /* piano strip */
  .piano{display:block;}
  .pkey-w{fill:#EDE6D6;stroke:#0C0A08;stroke-width:1;}
  .pkey-b{fill:var(--black-key);stroke:#000;stroke-width:1;}
  .pkey-w.lit{fill:var(--brass);}
  .pkey-b.lit{fill:var(--brass);}
  @media (prefers-reduced-motion:no-preference){
    .pkey-w,.pkey-b{transition:fill .22s ease;}
  }

  /* ---------- Sections / chords ---------- */
  .section{margin:26px 0;}
  .section .shead{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
  .section .sname{
    font-size:12px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--brass);
  }
  .section .slyric{font-size:14px;color:var(--ivory-dim);font-style:italic;font-family:"Fraunces",serif;}
  .prog{display:flex;flex-wrap:wrap;gap:8px;margin:7px 0;}
  .chord{
    font-family:"JetBrains Mono",monospace;font-weight:700;font-size:17px;
    background:var(--ink-2);border:1px solid var(--line);border-radius:9px;
    padding:9px 13px;letter-spacing:0.01em;min-width:46px;text-align:center;
    color:var(--ivory);
  }
  .chord.slash{color:var(--ivory);}
  .chord .b{color:var(--ivory-dim);font-weight:500;}

  .foot{margin-top:60px;padding-top:20px;border-top:1px solid var(--line);
    font-size:12px;color:var(--ivory-dim);text-align:center;letter-spacing:0.02em;}

  @media (max-width:560px){
    .console{grid-template-columns:1fr;}
    .panel-right{align-items:stretch;}
    .stepper{justify-content:space-between;}
    .piano{margin:0 auto;}
  }

  /* route transition */
  @media (prefers-reduced-motion:no-preference){
    .view{animation:rise .32s ease both;}
    @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  }
</style>
</head>

const KEY_NAMES={0:"C",1:"Db",2:"D",3:"Eb",4:"E",5:"F",6:"F#",7:"G",8:"Ab",9:"A",10:"Bb",11:"B"};
// clean ≤1-accidental spellings, used to rescue chromatic chords from ugly double-accidentals
const SHARP_NAMES={0:"C",1:"C#",2:"D",3:"D#",4:"E",5:"F",6:"F#",7:"G",8:"G#",9:"A",10:"A#",11:"B"};
const FLAT_NAMES ={0:"C",1:"Db",2:"D",3:"Eb",4:"E",5:"F",6:"Gb",7:"G",8:"Ab",9:"A",10:"Bb",11:"B"};
const SHARP_KEYS=new Set([7,2,9,4,11,6]); // G D A E B F# spell with sharps; everything else flats
const mod12 = n => ((n%12)+12)%12;
const keyUsesSharps = pc => SHARP_KEYS.has(mod12(pc));

function accVal(acc){ let v=0; for(const c of acc){ v += c==="#"?1 : c==="b"?-1 : 0; } return v; }
function accStr(v){ return v>0 ? "#".repeat(v) : v<0 ? "b".repeat(-v) : ""; }

// diatonic, interval-preserving transposition of a single note name.
// useSharps biases the enharmonic spelling when a clean diatonic spelling isn't available.
function transposeNote(name, letterSteps, semis, useSharps){
  const letter=name[0], acc=name.slice(1);
  const oldIdx=LETTERS.indexOf(letter);
  const newIdx=((oldIdx+letterSteps)%7+7)%7;
  const newLetter=LETTERS[newIdx];
  const oldPc=mod12(LETTER_PC[letter]+accVal(acc));
  const targetPc=mod12(oldPc+semis);
  let d=mod12(targetPc-LETTER_PC[newLetter]);
  if(d>6) d-=12;                 // keep accidentals minimal
  // diatonic spelling is clean (natural or single accidental) -> use it;
  // otherwise fall back to a key-appropriate ≤1-accidental spelling
  const spelled = Math.abs(d)<=1 ? newLetter+accStr(d) : (useSharps ? SHARP_NAMES : FLAT_NAMES)[targetPc];
  return tidyEnharmonic(spelled);
}
// B/E have no sharp and C/F no flat; collapse those awkward spellings to white keys.
// E# is left intact since it's the diatonic leading tone of F# major.
function tidyEnharmonic(n){
  return n==="Cb" ? "B" : n==="Fb" ? "E" : n==="B#" ? "C" : n;
}

// transpose a full chord token (root + suffix, optional /bass)
function transposeToken(token, letterSteps, semis, useSharps){
  if(!token || token==="N.C." || token==="-") return token;
  return token.split("/").map(part=>{
    const m=part.match(/^([A-G][#b]?)(.*)$/);
    if(!m) return part;
    return transposeNote(m[1], letterSteps, semis, useSharps) + m[2];
  }).join("/");
}

// the (letterSteps, semis) interval that moves this song's key by `semis`
function shiftFor(song, semis){
  const oldKey=KEY_NAMES[mod12(song.keyPc)];
  const newKeyPc=mod12(song.keyPc+semis);
  const newKey=KEY_NAMES[newKeyPc];
  const letterSteps=LETTERS.indexOf(newKey[0])-LETTERS.indexOf(oldKey[0]);
  return {letterSteps, semis, useSharps:keyUsesSharps(newKeyPc)};
}

// pretty accidentals for display
function pretty(token){
  return token.replace(/([A-G])b/g,"$1\u266d").replace(/#/g,"\u266f");
}

function keyNameFor(song, semis){
  return pretty(KEY_NAMES[mod12(song.keyPc+semis)]) + " " + song.quality;
}

/* =========================================================
   STATE + ROUTER
   ========================================================= */
const state = { sort:"title", query:"" };
const transposeBySong = {}; // id -> live semitone offset
let currentView = null;     // 'library' | 'song' — for scroll restoration
let libraryScroll = 0;      // remembered scroll position of the list
const SONG_BY_ID = Object.fromEntries(SONGS.map(s=>[s.id,s]));

/* ---------- Singer's-key memory (persists across sessions via localStorage) ---------- */
const PERF_LS_KEY = "tunes.singerKeys.v1";
let PERF_KEYS = {};
(function loadPerf(){ try{ PERF_KEYS = JSON.parse(localStorage.getItem(PERF_LS_KEY)) || {}; }catch(e){ PERF_KEYS = {}; } })();
function getPerf(id){ return Object.prototype.hasOwnProperty.call(PERF_KEYS,id) ? PERF_KEYS[id] : null; }
function persistPerf(){ try{ localStorage.setItem(PERF_LS_KEY, JSON.stringify(PERF_KEYS)); }catch(e){} }
function setPerf(id, semis){ PERF_KEYS[id]=semis; persistPerf(); }
function clearPerf(id){ delete PERF_KEYS[id]; persistPerf(); }
const shortKey = (song,semis)=> keyNameFor(song,semis).replace(" major","").replace(" minor","m");

function sortedFrom(src){
  let list = src.slice();
  const q = state.query.trim().toLowerCase();
  if(q) list = list.filter(s => s.t.toLowerCase().includes(q) || s.a.toLowerCase().includes(q));
  const tkey = s => s.t.replace(/^The\s+/i,"").toLowerCase();
  list.sort((a,b)=>{
    if(state.sort==="artist"){
      const c = a.a.localeCompare(b.a, undefined, {sensitivity:"base"});
      return c!==0 ? c : tkey(a).localeCompare(tkey(b), undefined, {sensitivity:"base"});
    }
    return tkey(a).localeCompare(tkey(b), undefined, {sensitivity:"base"});
  });
  return list;
}
function sortedSongs(){ return sortedFrom(CATALOG); }

function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function esc(s){ return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

function chordHTML(token){
  const p = pretty(token);
  if(p.includes("/")){
    const [a,b]=p.split("/");
    return `<span class="chord slash">${esc(a)}<span class="b">/${esc(b)}</span></span>`;
  }
  return `<span class="chord">${esc(p)}</span>`;
}

/* ---------- Library view ---------- */
function renderLibrary(){
  const app = document.getElementById("app");
  const view = el(`<div class="view"></div>`);

  view.appendChild(el(`
    <header class="masthead">
      <div class="brand">
        <span class="eyebrow">Chord book · piano</span>
        <h1><em>Tunes</em></h1>
      </div>
      <div class="tally"><b>${CHARTED_COUNT}</b>charted of ${PLAYLIST_TOTAL}<br>in the playlist</div>
    </header>
  `));

  const controls = el(`
    <div class="controls">
      <label class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" placeholder="Search title or artist" aria-label="Search songs" />
      </label>
      <div class="seg" role="group" aria-label="Sort songs">
        <button data-sort="title" aria-pressed="${state.sort==="title"}">By title</button>
        <button data-sort="artist" aria-pressed="${state.sort==="artist"}">By artist</button>
      </div>
    </div>
  `);
  controls.querySelector("input").value = state.query;
  controls.querySelector("input").addEventListener("input", e=>{
    state.query = e.target.value; refreshList();
  });
  controls.querySelectorAll(".seg button").forEach(b=>{
    b.addEventListener("click", ()=>{
      state.sort = b.dataset.sort;
      controls.querySelectorAll(".seg button").forEach(x=>x.setAttribute("aria-pressed", x.dataset.sort===state.sort));
      refreshList();
    });
  });
  view.appendChild(controls);

  const list = el(`<div class="list" id="songlist"></div>`);
  view.appendChild(list);

  view.appendChild(el(`
    <div class="hint">
      All <b>${PLAYLIST_TOTAL} songs</b> from the playlist are listed. <b>${CHARTED_COUNT}</b> have full chord charts (tap to open);
      the rest are marked <span class="soon">soon</span> and get charted in batches. Say which you want next and they'll jump the queue.
    </div>
  `));

  view.appendChild(el(`
    <div class="suggested-wrap" id="suggested-wrap">
      <div class="suggested-head">
        <span class="sg-title">Suggested — in the same style</span>
        <span class="sg-sub">Six piano/soul-pop ballads picked to match the playlist. Bonus pages, fully charted — not part of your ${PLAYLIST_TOTAL}.</span>
      </div>
      <div class="list" id="suggestlist"></div>
    </div>
  `));

  app.innerHTML="";
  app.appendChild(view);
  refreshList();
  currentView = "library";
  requestAnimationFrame(()=>{ window.scrollTo(0, libraryScroll); });
}

function buildRow(s){
  const charted = !!s.id;
  let right;
  if(charted){
    const song = SONG_BY_ID[s.id];
    const sk = getPerf(s.id);
    const studio = `<div class="keychip">${esc(shortKey(song,0))}</div>`;
    const perf = (sk!==null && sk!==0) ? `<div class="keychip perf" title="Singer’s key">${esc(shortKey(song,sk))}</div>` : "";
    right = `<div class="chips">${perf}${studio}</div>`;
  } else {
    right = `<div class="soon">soon</div>`;
  }
  const row = el(`
    <div class="row${charted?"":" todo"}" ${charted?'role="link" tabindex="0"':""}>
      <div>
        <div class="t">${esc(s.t)}</div>
        <div class="a">${esc(s.a)}</div>
      </div>
      ${right}
    </div>
  `);
  if(charted){
    const go = ()=>{ location.hash = "#/song/"+s.id; };
    row.addEventListener("click", go);
    row.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); }});
  }
  return row;
}

function refreshList(){
  const list = document.getElementById("songlist");
  if(list){
    const songs = sortedSongs();
    list.innerHTML="";
    if(songs.length===0){
      list.appendChild(el(`<div class="empty">No songs match “${esc(state.query)}”.</div>`));
    } else {
      songs.forEach(s=> list.appendChild(buildRow(s)));
    }
  }
  // suggested (bonus) list
  const sgWrap = document.getElementById("suggested-wrap");
  const sgList = document.getElementById("suggestlist");
  if(sgWrap && sgList){
    const sg = sortedFrom(SUGGESTED);
    sgList.innerHTML="";
    sgWrap.style.display = sg.length ? "" : "none";
    sg.forEach(s=> sgList.appendChild(buildRow(s)));
  }
}

/* ---------- Piano strip ---------- */
function pianoSVG(){
  // one octave, white keys C D E F G A B ; black keys C# D# F# G# A#
  const whites=[{pc:0,x:0},{pc:2,x:24},{pc:4,x:48},{pc:5,x:72},{pc:7,x:96},{pc:9,x:120},{pc:11,x:144}];
  const blacks=[{pc:1,x:17},{pc:3,x:41},{pc:6,x:89},{pc:8,x:113},{pc:10,x:137}];
  let w = whites.map(k=>`<rect class="pkey-w" data-pc="${k.pc}" x="${k.x}" y="0" width="24" height="80" rx="2"/>`).join("");
  let b = blacks.map(k=>`<rect class="pkey-b" data-pc="${k.pc}" x="${k.x}" y="0" width="14" height="50" rx="2"/>`).join("");
  return `<svg class="piano" width="168" height="80" viewBox="0 0 168 80" aria-hidden="true">${w}${b}</svg>`;
}

/* ---------- Song view ---------- */
function renderSong(id){
  const song = SONGS.find(s=>s.id===id);
  if(!song){ location.hash="#/"; return; }
  if(transposeBySong[id]===undefined){
    const saved = getPerf(id);
    transposeBySong[id] = (saved===null ? 0 : saved);
  }

  const app = document.getElementById("app");
  const view = el(`<div class="view"></div>`);

  const backLink = el(`<a class="back" href="#/">← All songs</a>`);
  backLink.addEventListener("click", (e)=>{
    // true Back when we came from the library (restores native scroll + avoids piling history);
    // fall back to the library hash if this song was opened directly (no history to go back to)
    if(history.length > 1){ e.preventDefault(); history.back(); }
  });
  view.appendChild(backLink);

  const head = el(`
    <div class="songhead">
      <h2>${esc(song.title)}</h2>
      <div class="by">by <span>${esc(song.artist)}</span></div>
      ${song.notes ? `<div class="patch">▣ <span>${esc(song.notes)}</span></div>` : ""}
    </div>
  `);
  view.appendChild(head);

  const console_ = el(`
    <div class="console">
      <div class="readout">
        <span class="lbl">Key</span>
        <div class="keyflow" id="keyflow">
          <span class="orig" id="origkey"></span>
          <span class="arrow">→</span>
          <span class="now" id="nowkey"></span>
        </div>
        ${pianoSVG()}
      </div>
      <div class="panel-right">
        <div class="stepper">
          <button class="btn" id="down" aria-label="Down a semitone">−</button>
          <span class="semi" id="semi"></span>
          <button class="btn" id="up" aria-label="Up a semitone">+</button>
        </div>
        <div class="keymodes" id="keymodes">
          <button class="seg2" id="segStudio">Studio</button>
          <button class="seg2" id="segPerf">Singer’s key</button>
        </div>
        <button class="save" id="savePerf">★ Save this as singer’s key</button>
        <div class="perfnote" id="perfnote"></div>
      </div>
    </div>
  `);
  view.appendChild(console_);

  const sectionsWrap = el(`<div id="sections"></div>`);
  song.sections.forEach(sec=>{
    const block = el(`
      <div class="section">
        <div class="shead">
          <span class="sname">${esc(sec.name)}</span>
          <span class="slyric">${esc(sec.lyric)}</span>
        </div>
        <div class="progs"></div>
      </div>
    `);
    sectionsWrap.appendChild(block);
  });
  view.appendChild(sectionsWrap);

  view.appendChild(el(`<div class="foot">Studio pitch by default · transpose to suit the singer and Save — it’s remembered next time you open the song.</div>`));

  app.innerHTML="";
  app.appendChild(view);

  function paint(){
    const semis = transposeBySong[id];
    const sh = shiftFor(song, semis);

    document.getElementById("origkey").textContent = keyNameFor(song,0);
    document.getElementById("nowkey").textContent  = keyNameFor(song,semis);
    document.getElementById("keyflow").classList.toggle("same", semis===0);

    const semiEl = document.getElementById("semi");
    semiEl.innerHTML = semis===0 ? `<b>original</b>` : `<b>${semis>0?"+":""}${semis}</b> semitone${Math.abs(semis)===1?"":"s"}`;

    // singer's-key (performance) controls
    const saved = getPerf(id);
    const segStudio = document.getElementById("segStudio");
    const segPerf   = document.getElementById("segPerf");
    const saveBtn   = document.getElementById("savePerf");
    const note      = document.getElementById("perfnote");

    segStudio.classList.toggle("active", semis===0);
    segPerf.disabled = (saved===null);
    segPerf.classList.toggle("active", saved!==null && semis===saved && semis!==0);
    segPerf.textContent = saved!==null ? `Singer’s: ${shortKey(song,saved)}` : "Singer’s key";

    const atSaved = (saved!==null && semis===saved);
    saveBtn.disabled = (semis===0) || atSaved;
    saveBtn.textContent = (saved!==null && !atSaved) ? "★ Update singer’s key to this" : "★ Save this as singer’s key";

    if(saved!==null){
      note.innerHTML = `Singer’s key saved: <b>${esc(keyNameFor(song,saved))}</b> (${saved>0?"+":""}${saved}) <button class="linkbtn" id="clearPerf">clear</button>`;
      document.getElementById("clearPerf").addEventListener("click", ()=>{
        const wasAtSaved = (transposeBySong[id]===getPerf(id));
        clearPerf(id);
        if(wasAtSaved) transposeBySong[id]=0;
        paint();
      });
    } else {
      note.innerHTML = `<span class="muted">Transpose to suit the singer, then Save — it’ll be remembered.</span>`;
    }

    // light the tonic
    const tonic = mod12(song.keyPc + semis);
    document.querySelectorAll(".piano [data-pc]").forEach(k=>{
      k.classList.toggle("lit", Number(k.dataset.pc)===tonic);
    });

    // chords
    const blocks = sectionsWrap.querySelectorAll(".section");
    song.sections.forEach((sec,i)=>{
      const host = blocks[i].querySelector(".progs");
      host.innerHTML="";
      sec.lines.forEach(line=>{
        const row = document.createElement("div");
        row.className="prog";
        row.innerHTML = line.map(tok=>chordHTML(transposeToken(tok, sh.letterSteps, sh.semis, sh.useSharps))).join("");
        host.appendChild(row);
      });
    });
  }

  document.getElementById("down").addEventListener("click", ()=>{ transposeBySong[id]=Math.max(-11,transposeBySong[id]-1); paint(); });
  document.getElementById("up").addEventListener("click", ()=>{ transposeBySong[id]=Math.min(11,transposeBySong[id]+1); paint(); });
  document.getElementById("segStudio").addEventListener("click", ()=>{ transposeBySong[id]=0; paint(); });
  document.getElementById("segPerf").addEventListener("click", ()=>{ const s=getPerf(id); if(s!==null){ transposeBySong[id]=s; paint(); } });
  document.getElementById("savePerf").addEventListener("click", ()=>{ setPerf(id, transposeBySong[id]); paint(); });

  paint();
  currentView = "song";
  window.scrollTo(0,0);
}

/* ---------- Router ---------- */
function route(){
  const h = location.hash || "#/";
  const m = h.match(/^#\/song\/(.+)$/);
  if(m) renderSong(decodeURIComponent(m[1]));
  else renderLibrary();
}
if("scrollRestoration" in history){ history.scrollRestoration = "manual"; }
window.addEventListener("hashchange", route);
// remember where you were in the list, so Back returns you there
window.addEventListener("scroll", ()=>{ if(currentView==="library") libraryScroll = window.scrollY; }, {passive:true});
route();
</script>
</body>
